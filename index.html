<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Latihan Membaca Timbangan</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Nunito', sans-serif; background: #1a1a2e; overscroll-behavior-y: none; }

    .scale-needle {
      transform-origin: 50% 90%;
      transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .bounce-in { animation: bounceIn 0.5s ease-out; }
    @keyframes bounceIn {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(234, 88, 12, 0.3); }
      50% { box-shadow: 0 0 20px 6px rgba(234, 88, 12, 0.15); }
    }

    .shake { animation: shake 0.5s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .confetti-piece {
      position: absolute;
      width: 8px; height: 8px; border-radius: 2px;
      animation: confettiFall 1.5s ease-out forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(120px) rotate(720deg) scale(0); opacity: 0; }
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    input[type="number"] { -moz-appearance: textfield; }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>
<body class="h-full overflow-hidden">
  <div id="app-wrapper" class="h-full w-full flex flex-col items-center overflow-y-auto" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
    
    <div class="w-full max-w-2xl px-4 pt-6 pb-2 shrink-0">
      <h1 id="el-title" class="text-center font-black text-2xl tracking-tight leading-tight" style="color: #f8fafc;">Latihan Membaca Timbangan</h1>
      <p id="el-instruction" class="text-center mt-1 font-semibold text-sm" style="color: #94a3b8;">Berapa berat yang ditunjukkan jarum?</p>
    </div>

    <div class="w-full max-w-2xl px-4 flex flex-col gap-2 mt-2 shrink-0">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-1.5 bg-black/20 px-3 py-1.5 rounded-xl">
          <span style="color: #fbbf24;"><i data-lucide="trophy" style="width:16px;height:16px;"></i></span> 
          <span id="el-score" class="font-bold text-sm" style="color: #fbbf24;">Skor: 0/0</span>
        </div>
        
        <div class="flex bg-[#0f3460] rounded-lg p-1 border border-[#1e3a5f]">
          <button id="btn-unit-kg" onclick="setUnit('kg')" class="px-3 py-1 rounded-md text-xs font-bold transition-all duration-200" style="background:#ea580c;color:#fff;">Kg</button>
          <button id="btn-unit-g" onclick="setUnit('g')" class="px-3 py-1 rounded-md text-xs font-bold transition-all duration-200" style="background:transparent;color:#94a3b8;">Gram</button>
        </div>
      </div>

      <div class="flex gap-1 justify-end">
        <button id="btn-easy" onclick="setDifficulty('easy')" class="px-3 py-1.5 rounded-lg text-[11px] font-bold transition-all duration-200" style="background:#0f3460;color:#94a3b8;border:1px solid #1e3a5f;">Mudah</button> 
        <button id="btn-medium" onclick="setDifficulty('medium')" class="px-3 py-1.5 rounded-lg text-[11px] font-bold transition-all duration-200" style="background:#ea580c;color:#fff;border:1px solid #ea580c;">Sedang</button> 
        <button id="btn-hard" onclick="setDifficulty('hard')" class="px-3 py-1.5 rounded-lg text-[11px] font-bold transition-all duration-200" style="background:#0f3460;color:#94a3b8;border:1px solid #1e3a5f;">Sulit</button>
      </div>
    </div>

    <div class="w-full max-w-2xl px-4 flex-1 flex flex-col items-center justify-center min-h-[220px]">
      <div class="relative w-full max-w-[320px] sm:max-w-[380px]">
        <svg id="scale-svg" viewBox="0 0 400 280" class="w-full h-auto drop-shadow-2xl">
          <defs>
            <radialGradient id="faceGrad" cx="50%" cy="40%" r="55%">
              <stop offset="0%" stop-color="#f8fafc" />
              <stop offset="80%" stop-color="#e2e8f0" />
              <stop offset="100%" stop-color="#cbd5e1" />
            </radialGradient>
            <radialGradient id="rimGrad" cx="50%" cy="30%">
              <stop offset="0%" stop-color="#64748b" />
              <stop offset="100%" stop-color="#334155" />
            </radialGradient>
            <filter id="innerShadow">
              <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur" />
              <feOffset dx="0" dy="2" />
              <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" />
              <feFlood flood-color="#000" flood-opacity="0.15" />
              <feComposite in2="SourceAlpha" operator="in" />
              <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>
          </defs> 
          
          <circle cx="200" cy="160" r="138" fill="url(#rimGrad)" stroke="#1e293b" stroke-width="2" /> 
          <circle cx="200" cy="160" r="128" fill="url(#faceGrad)" filter="url(#innerShadow)" /> 
          
          <g id="scale-markings"></g> 
          <g id="scale-numbers" style="font-family:'JetBrains Mono',monospace;"></g> 
          
          <text id="unit-label" x="200" y="210" text-anchor="middle" font-size="14" fill="#64748b" font-weight="800" style="font-family:'Nunito',sans-serif;">kg</text> 
          <text id="diff-label" x="200" y="226" text-anchor="middle" font-size="9" fill="#94a3b8" font-weight="600" style="font-family:'Nunito',sans-serif;"></text> 
          
          <g id="needle-group" class="scale-needle" transform="rotate(-135, 200, 160)">
            <line x1="200" y1="165" x2="200" y2="52" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" />
            <polygon points="197,60 200,45 203,60" fill="#dc2626" />
          </g> 
          
          <circle cx="200" cy="160" r="10" fill="#374151" /> 
          <circle cx="200" cy="160" r="6" fill="#6b7280" /> 
          <circle cx="200" cy="160" r="3" fill="#9ca3af" /> 
          
          <ellipse cx="175" cy="120" rx="50" ry="25" fill="rgba(255,255,255,0.12)" transform="rotate(-15, 175, 120)" /> 
          
          <rect x="130" y="272" width="140" height="8" rx="4" fill="#334155" /> 
          <path d="M165 268 Q200 280 235 268 L240 272 Q200 284 160 272 Z" fill="#475569" />
        </svg>

        <div id="range-badge" class="absolute top-0 right-0 px-2.5 py-1 rounded-lg text-xs font-bold" style="background:rgba(15,52,96,0.9);color:#94a3b8;backdrop-filter:blur(4px);">
          0 – 5 kg
        </div>

        <div id="confetti-container" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
      </div>
    </div>

    <div class="w-full max-w-sm px-4 pb-4 shrink-0">
      <div class="flex flex-col gap-3">
        <div>
          <label id="input-label" for="answer-input" class="block text-sm font-bold mb-1.5" style="color:#94a3b8;">Jawaban (kg)</label> 
          <input id="answer-input" type="number" step="any" min="0" inputmode="decimal" placeholder="contoh: 2.5" class="w-full px-4 py-3.5 sm:py-4 rounded-xl text-xl sm:text-2xl font-bold text-center outline-none transition-all duration-200" style="background:#16213e;color:#f8fafc;border:2px solid #1e3a5f;font-family:'JetBrains Mono',monospace;" onfocus="this.style.borderColor='#ea580c'" onblur="this.style.borderColor='#1e3a5f'" onkeydown="if(event.key==='Enter')checkAnswer()">
        </div>
        
        <button id="btn-check" onclick="checkAnswer()" class="w-full px-5 py-3.5 sm:py-4 rounded-xl font-bold text-base transition-all duration-200 pulse-glow" style="background:#ea580c;color:#fff;border:none;cursor:pointer;"> Periksa Jawaban </button>
      </div>

      <div id="feedback" class="mt-3 text-center font-bold text-sm sm:text-base rounded-xl px-4 py-3 transition-all duration-300 empty:hidden" style="min-height: 48px;"></div>
      
      <button id="btn-next" onclick="newQuestion()" class="w-full mt-2 mb-2 px-5 py-3.5 sm:py-4 rounded-xl font-bold text-base transition-all duration-200 shadow-lg" style="background:#1e3a5f;color:#e2e8f0;border:2px solid #2d4a6f;cursor:pointer;display:none;" onmouseover="this.style.background='#2d4a6f'" onmouseout="this.style.background='#1e3a5f'"> Lanjut Soal Baru </button>
    </div>

    <div id="streak-bar" class="w-full max-w-2xl px-4 pb-6 min-h-[40px]">
      <div class="flex items-center justify-center gap-1 flex-wrap" id="streak-icons"></div>
    </div>
  </div>

  <script>
  // ---- Konfigurasi Data Varian & Satuan ----
  let currentUnit = 'kg'; // default
  let difficulty = 'medium'; 
  
  const scaleData = {
    kg: {
      easy:   { max: 5,  step: 0.5, majorStep: 1, tolerance: 0.2, label: 'Tiap 0.5 kg', range: '0 – 5 kg' },
      medium: { max: 10, step: 0.5, majorStep: 2, tolerance: 0.2, label: 'Tiap 0.5 kg', range: '0 – 10 kg' },
      hard:   { max: 20, step: 0.1, majorStep: 2, tolerance: 0.05, label: 'Tiap 0.1 kg', range: '0 – 20 kg' }
    },
    g: {
      easy:   { max: 1000, step: 50,  majorStep: 200, tolerance: 25, label: 'Tiap 50 g',  range: '0 – 1000 g' },
      medium: { max: 2000, step: 100, majorStep: 500, tolerance: 50, label: 'Tiap 100 g', range: '0 – 2000 g' },
      hard:   { max: 5000, step: 50,  majorStep: 500, tolerance: 25, label: 'Tiap 50 g',  range: '0 – 5000 g' }
    }
  };

  // ---- State ----
  let currentWeight = 0;
  let score = 0;
  let total = 0;
  let streak = 0;
  let maxStreak = 0;
  let answered = false;

  const defaultConfig = {
    app_title: 'Latihan Membaca Timbangan',
    instruction_text: 'Berapa berat yang ditunjukkan jarum?',
    btn_check: 'Periksa Jawaban',
    btn_next: 'Lanjut Soal Baru',
    background_color: '#1a1a2e',
    surface_color: '#16213e',
    text_color: '#f8fafc',
    primary_action: '#ea580c',
    secondary_action: '#94a3b8',
    font_family: 'Nunito',
    font_size: 16
  };

  // ---- Menggambar Garis Timbangan ----
  function drawScale() {
    const d = scaleData[currentUnit][difficulty];
    const markingsEl = document.getElementById('scale-markings');
    const numbersEl = document.getElementById('scale-numbers');
    
    markingsEl.innerHTML = '';
    numbersEl.innerHTML = '';

    const markingsFrag = document.createDocumentFragment();
    const numbersFrag = document.createDocumentFragment();

    const cx = 200, cy = 160, r = 118;
    const startAngle = -225; 
    const endAngle = 45;
    const totalAngle = endAngle - startAngle; 

    const minorStep = d.step;
    const majorStep = d.majorStep;
    const halfMajorStep = d.majorStep / 2;
    const totalSteps = d.max / minorStep;

    const SVG_NS = 'http://www.w3.org/2000/svg';

    for (let i = 0; i <= totalSteps; i++) {
      const value = i * minorStep;
      const angle = startAngle + (value / d.max) * totalAngle;
      const rad = (angle * Math.PI) / 180;

      // Menghindari error pembulatan javascript saat modula
      const isMajor = Math.abs(value % majorStep) < 0.001 || Math.abs(value % majorStep - majorStep) < 0.001;
      const isHalfMajor = !isMajor && (Math.abs(value % halfMajorStep) < 0.001);

      const outerR = r;
      const innerR = isMajor ? r - 16 : isHalfMajor ? r - 10 : r - 6;
      const sw = isMajor ? 2 : 1;

      const line = document.createElementNS(SVG_NS, 'line');
      line.setAttribute('x1', cx + innerR * Math.cos(rad));
      line.setAttribute('y1', cy + innerR * Math.sin(rad));
      line.setAttribute('x2', cx + outerR * Math.cos(rad));
      line.setAttribute('y2', cy + outerR * Math.sin(rad));
      line.setAttribute('stroke', isMajor ? '#1e293b' : '#94a3b8');
      line.setAttribute('stroke-width', sw);
      markingsFrag.appendChild(line);

      // Gambar Angka hanya di garis Mayor
      if (isMajor) {
        const labelR = r - 26;
        const text = document.createElementNS(SVG_NS, 'text');
        text.setAttribute('x', cx + labelR * Math.cos(rad));
        text.setAttribute('y', cy + labelR * Math.sin(rad));
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'central');
        // Perkecil ukuran font jika angka ribuan (Gram)
        text.setAttribute('font-size', currentUnit === 'g' && d.max > 1000 ? '10' : '12');
        text.setAttribute('font-weight', '700');
        text.setAttribute('fill', '#334155');
        text.textContent = Math.round(value);
        numbersFrag.appendChild(text);
      }
    }

    markingsEl.appendChild(markingsFrag);
    numbersEl.appendChild(numbersFrag);

    document.getElementById('range-badge').textContent = d.range;
    document.getElementById('diff-label').textContent = d.label;
    
    // Update label text SVG
    document.getElementById('unit-label').textContent = currentUnit === 'kg' ? 'kg' : 'g';
    // Update label input form
    document.getElementById('input-label').textContent = `Jawaban (${currentUnit === 'kg' ? 'kg' : 'Gram'})`;
  }

  // ---- Jarum ----
  function setNeedle(weight) {
    const d = scaleData[currentUnit][difficulty];
    const startAngle = -135;
    const totalAngle = 270;
    const angle = startAngle + (weight / d.max) * totalAngle;
    const needle = document.getElementById('needle-group');
    needle.style.transform = `rotate(${angle}deg)`;
    needle.style.transformOrigin = '200px 160px';
  }

  // ---- Logic Soal Baru ----
  function generateWeight() {
    const d = scaleData[currentUnit][difficulty];
    const steps = d.max / d.step;
    const minStep = 1;
    const randomStep = Math.floor(Math.random() * (steps - minStep + 1)) + minStep;
    // Bersihkan angka desimal
    return parseFloat((randomStep * d.step).toFixed(2));
  }

  function newQuestion() {
    answered = false;
    currentWeight = generateWeight();
    setNeedle(currentWeight);

    const input = document.getElementById('answer-input');
    input.value = '';
    input.disabled = false;

    const fb = document.getElementById('feedback');
    fb.innerHTML = '';
    fb.style.background = 'transparent';
    
    document.getElementById('btn-next').style.display = 'none';
    document.getElementById('btn-check').style.display = 'block';
  }

  // ---- Logic Jawaban ----
  function checkAnswer() {
    if (answered) return;
    const input = document.getElementById('answer-input');
    input.blur(); 
    
    const val = parseFloat(input.value);
    const fb = document.getElementById('feedback');

    if (isNaN(val) || val < 0) {
      fb.innerHTML = '⚠️ Masukkan angka yang valid';
      fb.style.background = 'rgba(234,179,8,0.15)';
      fb.style.color = '#fbbf24';
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 500);
      return;
    }

    answered = true;
    total++;
    const d = scaleData[currentUnit][difficulty];
    const diff = Math.abs(val - currentWeight);
    const correct = diff <= d.tolerance;
    const unitText = currentUnit === 'kg' ? 'kg' : 'g';

    if (correct) {
      score++;
      streak++;
      if (streak > maxStreak) maxStreak = streak;
      fb.innerHTML = `🎉 Benar! Jawabannya <strong>${currentWeight} ${unitText}</strong>` + (streak >= 3 ? `<br>🔥 ${streak}x berturut-turut!` : '');
      fb.style.background = 'rgba(34,197,94,0.15)';
      fb.style.color = '#4ade80';
      spawnConfetti();
    } else {
      streak = 0;
      fb.innerHTML = `❌ Kurang tepat. Jawabanmu <strong>${val} ${unitText}</strong>,<br>yang benar <strong>${currentWeight} ${unitText}</strong>`;
      fb.style.background = 'rgba(239,68,68,0.15)';
      fb.style.color = '#f87171';
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 500);
    }

    document.getElementById('el-score').textContent = `Skor: ${score}/${total}`;
    input.disabled = true;
    document.getElementById('btn-check').style.display = 'none';
    document.getElementById('btn-next').style.display = 'block';
    updateStreak();
  }

  // ---- Pengaturan Satuan & Tingkat Kesulitan ----
  function setUnit(u) {
    currentUnit = u;
    const btnKg = document.getElementById('btn-unit-kg');
    const btnG = document.getElementById('btn-unit-g');
    
    const cfg = window.elementSdk ? window.elementSdk.config : defaultConfig;
    const primary = cfg.primary_action || defaultConfig.primary_action;

    if (u === 'kg') {
      btnKg.style.background = primary; btnKg.style.color = '#fff';
      btnG.style.background = 'transparent'; btnG.style.color = '#94a3b8';
    } else {
      btnG.style.background = primary; btnG.style.color = '#fff';
      btnKg.style.background = 'transparent'; btnKg.style.color = '#94a3b8';
    }
    
    // Refresh SVG & Buat Soal Baru
    drawScale();
    newQuestion();
  }

  function setDifficulty(d) {
    difficulty = d;
    const btns = { easy: 'btn-easy', medium: 'btn-medium', hard: 'btn-hard' };
    const cfg = window.elementSdk ? window.elementSdk.config : defaultConfig;
    const primaryAction = cfg.primary_action || defaultConfig.primary_action;
    const surfaceColor = cfg.surface_color || defaultConfig.surface_color;
    const secondaryAction = cfg.secondary_action || defaultConfig.secondary_action;

    Object.entries(btns).forEach(([key, id]) => {
      const btn = document.getElementById(id);
      if(!btn) return;
      if (key === d) {
        btn.style.background = primaryAction;
        btn.style.color = '#fff';
        btn.style.borderColor = primaryAction;
      } else {
        btn.style.background = surfaceColor;
        btn.style.color = secondaryAction;
        btn.style.borderColor = '#1e3a5f';
      }
    });
    drawScale();
    newQuestion();
  }

  // ---- UI Helpers ----
  function updateStreak() {
    const container = document.getElementById('streak-icons');
    container.innerHTML = '';
    const show = Math.min(streak, 10);
    const frag = document.createDocumentFragment();

    for (let i = 0; i < show; i++) {
      const span = document.createElement('span');
      span.textContent = '🔥';
      span.style.fontSize = '18px';
      span.className = 'bounce-in';
      span.style.animationDelay = `${i * 60}ms`;
      frag.appendChild(span);
    }
    
    if (streak > 10) {
      const span = document.createElement('span');
      span.textContent = `+${streak - 10}`;
      span.style.cssText = 'font-size:14px;font-weight:800;color:#fbbf24;margin-left:4px;';
      frag.appendChild(span);
    }
    container.appendChild(frag);
  }

  function spawnConfetti() {
    const container = document.getElementById('confetti-container');
    const colors = ['#ea580c', '#fbbf24', '#4ade80', '#60a5fa', '#f472b6', '#a78bfa'];
    const frag = document.createDocumentFragment();

    for (let i = 0; i < 20; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = `${30 + Math.random() * 40}%`;
      piece.style.top = `${20 + Math.random() * 20}%`;
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDelay = `${Math.random() * 0.4}s`;
      piece.style.transform = `rotate(${Math.random() * 360}deg)`;
      frag.appendChild(piece);
      setTimeout(() => piece.remove(), 2000);
    }
    container.appendChild(frag);
  }

  function adjustColor(hex, amount) {
    hex = hex.replace('#', '');
    if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
    let r = Math.max(0, Math.min(255, parseInt(hex.substring(0, 2), 16) + amount));
    let g = Math.max(0, Math.min(255, parseInt(hex.substring(2, 4), 16) + amount));
    let b = Math.max(0, Math.min(255, parseInt(hex.substring(4, 6), 16) + amount));
    return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
  }

  function applyConfig(config) {
    const c = key => config[key] || defaultConfig[key];
    const font = c('font_family');
    const bg = c('background_color');
    const surface = c('surface_color');
    const text = c('text_color');
    const primary = c('primary_action');
    const secondary = c('secondary_action');

    document.getElementById('el-title').textContent = c('app_title');
    document.getElementById('el-instruction').textContent = c('instruction_text');
    document.getElementById('btn-check').textContent = c('btn_check');
    document.getElementById('btn-next').textContent = c('btn_next');

    const fontStack = `${font}, 'Nunito', sans-serif`;
    document.body.style.fontFamily = fontStack;

    const wrapper = document.getElementById('app-wrapper');
    wrapper.style.background = `linear-gradient(135deg, ${bg} 0%, ${surface} 50%, ${adjustColor(bg, 20)} 100%)`;

    document.getElementById('el-title').style.color = text;
    document.getElementById('el-instruction').style.color = secondary;
    document.getElementById('el-score').style.color = '#fbbf24';

    const input = document.getElementById('answer-input');
    input.style.background = surface;
    input.style.color = text;

    document.getElementById('btn-check').style.background = primary;
    document.getElementById('btn-next').style.borderColor = adjustColor(surface, 30);

    setUnit(currentUnit);
    setDifficulty(difficulty);
  }

  // ---- Element SDK ----
  if(window.elementSdk) {
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => { applyConfig(config); },
      mapToCapabilities: (config) => {
        const c = key => config[key] || defaultConfig[key];
        const makeColor = (key) => ({
          get: () => c(key),
          set: (v) => { config[key] = v; window.elementSdk.setConfig({ [key]: v }); }
        });
        return {
          recolorables: [
            makeColor('background_color'), makeColor('surface_color'),
            makeColor('text_color'), makeColor('primary_action'), makeColor('secondary_action')
          ],
          borderables: [],
          fontEditable: {
            get: () => c('font_family'),
            set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: {
            get: () => c('font_size'),
            set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
          }
        };
      },
      mapToEditPanelValues: (config) => new Map([
        ['app_title', config.app_title || defaultConfig.app_title],
        ['instruction_text', config.instruction_text || defaultConfig.instruction_text],
        ['btn_check', config.btn_check || defaultConfig.btn_check],
        ['btn_next', config.btn_next || defaultConfig.btn_next]
      ])
    });
  }

  // ---- Init ----
  if(typeof lucide !== 'undefined') lucide.createIcons();
  drawScale();
  newQuestion();
  </script>
</body>
</html>
